models:
  - name: stg_autre__customers
    description: Customer data with basic cleaning and transformation applied, one row per customer.
    columns:
      - name: customer_id
        description: The unique key for each customer.
        data_tests:
          - not_null
          - unique

  - name: stg_autre__order_items
    description: Individual food and drink items that make up our orders, one row per item.
    columns:
      - name: order_item_id
        description: The unique key for each order item.
        data_tests:
          - not_null
          - unique
      - name: order_id
        description: The corresponding order each order item belongs to
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_autre__orders')
                field: order_id

  - name: stg_autre__orders
    description: Order data with basic cleaning and transformation applied, one row per order.
    columns:
      - name: order_id
        description: The unique key for each order.
        data_tests:
          - not_null
          - unique
    data_tests:
      - dbt_utils.expression_is_true:
          arguments:
            expression: "order_total - tax_paid = subtotal"

  - name: stg_autre__products
    description: Product (food and drink items that can be ordered) data with basic cleaning and transformation applied, one row per product.
    columns:
      - name: product_id
        description: The unique key for each product.
        data_tests:
          - not_null
          - unique

  - name: stg_autre__locations
    description: >
      List of open locations with basic cleaning and transformation applied, one row per location.
    columns:
      - name: location_id
        description: The unique key of our store locations.
        data_tests:
          - not_null
          - unique

  - name: stg_autre__supplies
    description: >
      List of our supply expenses data with basic cleaning and transformation applied.
      One row per supply cost, not per supply. 
      As supply costs fluctuate they receive a new row with a new UUID. 
      Thus there can be multiple rows per supply_id.
    columns:
      - name: supply_uuid
        description: The unique key of our supplies per cost.
        data_tests:
          - not_null
          - unique