models:
  - name: stg_stripe__payments
    description: staging payments
    columns:
      - name: payment_id
        description: payment PK
        data_tests:
          - unique:
            config:
              severity: error
              limit: 10
              error_if: ">=100"
              warn_if: ">=10"
              store_failures: true
          - not_null
      - name: order_id
        description: order FK
        data_tests:
          - relationships:
              arguments:
                to: ref('stg_jaffle_shop__orders')
                field: order_id