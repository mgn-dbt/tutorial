sources:
  - name: jaffle_shop
    database: dbt-tutorial
    schema: jaffle_shop
    description: big query jaffle_shop dataset from dbt-tutorial
    tables:
      - name: customers
        description: raw customer table
      - name: orders
        description: raw orders table
        config:
          freshness:
            warn_after:
              count: 12
              period: hour
            error_after:
              count: 1
              period: day
          loaded_at_field: _etl_loaded_at