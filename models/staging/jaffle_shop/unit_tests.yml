unit_tests:
  - name: test_order_status_cleanup
    description: Test my status case/when cleanup logic
    model: stg_jaffle_shop__orders
    given:
      - input: source('jaffle_shop', 'orders')
        rows:
          - { id: 1, status: completed }
          - { id: 2, status: placed }
          - { id: 3, status: return_pending }
          - { id: 4, status: returned }
          - { id: 5, status: shipped }
    expect:
      rows:
        - { order_id: 1, status: completed }
        - { order_id: 2, status: placed }
        - { order_id: 3, status: returned }
        - { order_id: 4, status: returned }
        - { order_id: 5, status: shipped }

  - name: test_days_since_ordered
    description: Test my datediff calculation for days_since_ordered
    model: stg_jaffle_shop__orders
    # overrides with dbt internal macro dont work in fusion (dbt.current_timestamp)
    overrides:
      macros:
        my_current_timestamp: "timestamp('2024-01-15 00:00:00+00')"
    given:
      - input: source('jaffle_shop',  'orders')
        rows:
          - {order_date: 2024-01-01}
    expect:
      rows:
        - {order_date: 2024-01-01, days_since_ordered: 14}

  - name: test_full_name
    description: Test my full_name calculation 
    model: stg_jaffle_shop__customers
    given:
      - input: source('jaffle_shop',  'customers')
        rows:
          - {first_name: Grace,     last_name: Goheen}
          - {first_name: MICHELLE,  last_name: ARK}
          - {first_name: gerda,     last_name: shank}
          - {first_name: DoUg,     last_name: BeAtTy}
    expect:
      rows:
        - {full_name: Grace Goheen}
        - {full_name: Michelle Ark}
        - {full_name: Gerda Shank}
        - {full_name: Doug Beatty}