models:
  - name: stg_jaffle_shop__customers
    description: customer staging table
    columns:
      - name: customer_id
        description: customers PK
        tests:
          - unique
          - not_null
  - name: stg_jaffle_shop__orders
    description: orders staging table
    columns:
      - name: order_id
        description: orders PK
        tests:
         - unique
         - not_null
      - name: status
        description: "{{ doc('order_status') }}"
        data_tests:
          - accepted_values:
              arguments:
                values:
                  - completed
                  - shipped
                  - returned
                  - placed
                  - return_pending
      - name: customer_id
        description: customers FK
        data_tests:
          - relationships:
              arguments:
                to: ref('stg_jaffle_shop__customers')
                field: customer_id