models:
  - name: dim_autre_customers
    description: |
      Customer overview data mart, offering key details for each unique customer. 
      One row per customer.
    columns:
      - name: customer_id
        description: The unique key of the orders mart.
        data_tests:
          - not_null
          - unique
        entity:
          type: primary
          name: customer
          label: Customer
          description: PK for the customers mart, representing a unique customer.

      - name: customer_name
        description: Customer full name.
        dimension:
          type: categorical
          name: customer_name
          label: Customer Name
          description: Customer full name.
          #is_partition: true|false # optional
          #validity_params: [optional]
            #start_time: [optional, required if validity_params is provided, indicates the column name for the start time of the record's validity period] 
            #end_time: [optional, required if validity_params is provided, indicates the column name for the end time of the record's validity period]

      - name: count_lifetime_orders
        description: Total number of orders a customer has ever placed.

      - name: first_ordered_at
        description: The timestamp when a customer placed their first order.
        dimension:
          type: time
          name: first_ordered_at
          label: first order date
          description: The timestamp when a customer placed their first order.
        granularity: day

      - name: last_ordered_at
        description: The timestamp of a customer's most recent order.
        dimension:
          type: time
          name: last_ordered_at
          label: most recent order date
          description: The timestamp of a customer's most recent order.
        granularity: day

      - name: lifetime_spend_pretax
        description: The sum of all the pre-tax subtotals of every order a customer has placed.
      - name: lifetime_spend
        description: The sum of all the order totals (including tax) that a customer has ever placed.
      - name: customer_type
        description: |
          Options are 'new' or 'returning', indicating if a customer has ordered more than once 
          or has only placed their first order to date.
        data_tests:
          - accepted_values:
              arguments:
                values: ["new", "returning"]
        dimension:
          type: categorical
          name: customer_type
          label: Customer Type
          description: | 
            Options are 'new' or 'returning', indicating if a customer has ordered more than once 
            or has only placed their first order to date.

    semantic_model:
      enabled: true
      name: dim_autre_customers
    agg_time_dimension: first_ordered_at

    metrics:
      - name: customers
        label: customers
        description: Count of customers
        type: simple
        #agg_time_dimension: first_ordered_at
        #time_granularity: day
        agg: count_distinct
        expr: customer_id

      - name: customers_with_orders
        label: customers_with_orders
        description: Unique count of customers placing orders
        type: simple
        agg: count_distinct
        expr: case when count_lifetime_orders = 0 then '0' else customer_id end

      - name: count_lifetime_orders
        description: Total count of orders per customer.
        type: simple
        agg: sum
        #hidden: true

      - name: lifetime_spend_pretax
        description: Customer lifetime spend before taxes.
        type: simple
        agg: sum
        #hidden: true

      - name: lifetime_spend
        description: Gross customer lifetime spend inclusive of taxes.
        type: simple
        agg: sum
        #hidden: true


  - name: order_items
    description: |
      Order items data mart, offering key details for each individual item within an order. 
      One row per order item.

    columns:
      - name: order_item_id
        description: The unique key of the order items mart.
        data_tests:
          - not_null
          - unique
        entity:
          type: primary
          name: order_item
          label: Order Item
          description: PK for the order items mart, representing a unique item within an order.

      - name: order_id
        description: The foreign key relating to the order this item belongs to.
        data_tests:
          - relationships:
              arguments:
                to: ref('fct_autre_orders')
                field: order_id
        entity:
          type: foreign
          name: cmde   # le nom order est un mot reserve du sql
          label: Order
          description: FK linking to the orders mart, representing the order this item belongs to.

      - name: product_id
        description: The foreign key relating to the product that was ordered.
        entity:
          type: foreign
          name: product
          label: product
          description: FK linking to the products dimension, representing the product that was ordered.

      - name: product_price
        description: The number of this specific product that was ordered.
      - name: supply_cost
        description: The price of a single unit of this product without tax.
      - name: is_food_item
        description: A boolean indicating if this item is a food item.
        dimension: 
          type: categorical
          name: is_food_item 
          label: is_food_item 
          description: A boolean indicating if this item is a food item.

      - name: is_drink_item
        description: A boolean indicating if this item is a drink item.
        dimension: 
          type: categorical
          name: is_drink_item
          label: is_drink_item 
          description: A boolean indicating if this item is a drink item.

      - name: ordered_at
        description: The timestamp the order containing this item was placed at.
        dimension:
          type: time
          name: ordered_at
          label: ordered_at
          description: The timestamp the order containing this item was placed at.
        granularity: day

      - name: ordered_at_day
        description: The day the order containing this item was placed at.

    semantic_model:
      enabled: true
      name: order_items
    agg_time_dimension: ordered_at

    metrics:
      - name: revenue
        description: |
          The revenue generated for each order item. 
          Revenue is calculated as a sum of revenue associated with each product in an order.
        type: simple
        agg: sum
        expr: product_price
        #hidden: true

      - name: food_revenue
        description: |
          The revenue generated for each order item. 
          Revenue is calculated as a sum of revenue associated with each product in an order.
        type: simple
        agg: sum
        expr: case when is_food_item = 1 then product_price else 0 end
        #hidden: true

      - name: drink_revenue
        description: |
          The revenue generated for each order item. 
          Revenue is calculated as a sum of revenue associated with each product in an order.
        type: simple
        agg: sum
        expr: case when is_drink_item = 1 then product_price else 0 end
        #hidden: true

  - name: fct_autre_orders
    description: |
      Order overview data mart, offering key details for each order inlcluding 
      if it's a customer's first order and a food vs. drink item breakdown. 
      One row per order.
    columns:
      - name: order_id
        description: The unique key of the orders mart.
        data_tests:
          - not_null
          - unique
        entity:
          type: primary
          name: cmde
          label: Order
          description: PK for the orders mart, representing a unique order.
      - name: customer_id
        description: The foreign key relating to the customer who placed the order.
        data_tests:
          - relationships:
              arguments:
                to: ref('stg_autre__customers')
                field: customer_id
        entity:
          type: foreign
          name: customer
          label: Customer
          description: FK linking to the customers dimension, representing the customer who placed the order.
      - name: location_id
        description: The foreign key relating to the location the order was placed at.
        entity:
          type: foreign
          name: location
          label: Location
          description: FK linking to the locations dimension, representing the location the order was placed at.
      - name: order_total
        description: The total amount of the order in USD including tax.
        dimension:
          type: categorical
          name: order_total_dim
          label: order total
          description: The total amount of the order in USD including tax.
      - name: ordered_at
        description: The timestamp the order was placed at.
        dimension:
          type: time
          name: ordered_at
          label: ordered at
          description: The timestamp the order was placed at.
        granularity: day

      - name: count_food_items
        description: The number of individual food items ordered.
      - name: count_drink_items
        description: The number of individual drink items ordered.
      - name: count_items
        description: The total number of both food and drink items ordered.
      - name: subtotal_food_items
        description: The sum of all the food item prices without tax.
      - name: subtotal_drink_items
        description: The sum of all the drink item prices without tax.
      - name: subtotal
        description: The sum total of both food and drink item prices without tax.
      - name: order_cost
        description: The sum of supply expenses to fulfill the order.
      - name: location_name
        description: The full location name of where this order was placed. Denormalized from `stg_locations`.
      - name: is_first_order
        description: A boolean indicating if this order is from a new customer placing their first order.
      - name: is_food_order
        description: A boolean indicating if this order included any food items.
        dimension:
          type: categorical
          name: is_food_order
          label: food order boolean
          description: A boolean indicating if this order included any food items.
      - name: is_drink_order
        description: A boolean indicating if this order included any drink items.
        dimension:
          type: categorical
          name: is_drink_order
          label: drink order boolean
          description: A boolean indicating if this order included any drink items.

    semantic_model:
      enabled: true
      name: fct_autre_orders
    agg_time_dimension: ordered_at

    metrics:
      - name: order_total
        label: order_total
        description: Sum of orders value
        type: simple
        agg: sum

      - name: locations_with_orders
        label: locations_with_orders
        description: The number of locations that have orders.
        type: simple
        agg: count_distinct
        expr: location_id

      # - name: order_value_p99
      #   label: order_value_p99
      #   description: The 99th percentile of each order
      #   type: simple
      #   agg: percentile
      #   expr: order_total

      # - name: discrete_order_value_p99
      #   label: discrete_order_value_p99
      #   description: The 99th percentile of each order using a discrete distribution
      #   type: simple
      #   agg: percentile
      #   expr: order_total

      - name: large_order
        label: Large Orders
        description: Count of orders with order total over 20.
        type: simple
        agg: sum
        expr: 1
        filter: |
          {{ Dimension('cmde__order_total_dim') }} >= 20
          
      - name: food_order_amount
        label: food_order_amount
        description: Sum order amount for food orders.
        type: simple
        agg: sum
        expr: case when is_food_order then order_total else 0 end

      - name: max_order_amount
        label: max_order_amount
        description: The highest order value for a given period
        type: simple
        agg: max
        agg_time_dimension: ordered_at
        expr: order_total

      - name: min_order_amount
        label: min_order_amount
        description: The lowest order value for a given period
        type: simple
        agg: min
        expr: order_total

      - name: new_customer
        description: Unique count of new customers.
        label: New Customers
        type: simple
        agg: count_distinct
        expr: customer_id
        filter: |
          {{ Dimension('customer__customer_type') }} = 'new'

      - name: order_amount
        label: order_amount
        description: The cost of fulfilling each order
        type: simple
        agg: sum
        expr: order_cost

      - name: tax_paid
        description: The total tax paid on each order.
        type: simple
        agg: sum
        #hidden: true

# RATIO METRICS
      - name: food_order_pct
        label: food_order_pct
        description: The food cost as the % of the total order
        type: ratio
        numerator: food_order_amount
        denominator: order_total

# DERIVED METRICS
      - name: food_order_pct_cumulative
        label: food_order_as_percent_of_total_order_amount
        description: Food order total as a % of total order amount
        type: derived
        expr: food_order_pct * 100
        input_metrics:
          - name: food_order_pct

      - name: food_order_gross_profit
        label: food_order_gross_profit
        description: The gross profit for each food order
        type: derived
        expr: revenue - cost
        input_metrics:
          - name: order_total
            alias: revenue
            filter: |
              {{ Dimension('cmde__is_food_order') }} = True
          - name: order_amount
            alias: cost
            filter: |
              {{ Dimension('cmde__is_food_order') }} = True

# CUMULATIVE METRICS 
      - name: order_total_1
        description: The total amount for each order including taxes.
        type: simple
        agg: sum
        expr: order_total
        hidden: true
        
      - name: cumulative_order_amount
        label: cumulative_order_amount
        description: The cumulative value of all orders
        type: cumulative
        input_metric: order_total_1

      - name: cumulative_order_amount_l1m
        label: cumulative_order_amount_l1m
        description: Trailing 1 month cumulative order amount
        type: cumulative
        input_metric: order_total_1
        window: 1 month
        
      - name: cumulative_order_amount_mtd
        label: cumulative_order_amount_mtd
        description: The month to date value of all orders
        type: cumulative
        input_metric: order_total_1
        grain_to_date: month