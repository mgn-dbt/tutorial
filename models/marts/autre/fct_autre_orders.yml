models:
  - name: fct_autre_orders
    description: |
      Order overview data mart, offering key details for each order inlcluding 
      if it's a customer's first order and a food vs. drink item breakdown. 
      One row per order.

    columns:
      - name: order_id
        description: PK for the orders mart, representing a unique order.
        data_tests:
          - not_null
          - unique
        entity:
          type: primary
          name: order_id
          label: Order

      - name: order_customer_id
        description: FK linking to the customers dimension, representing the customer who placed the order.
        data_tests:
          - relationships:
              arguments:
                to: ref('stg_autre__customers')
                field: customer_id
        entity:
          type: foreign
          name: order_customer_id
          label: Customer

      - name: order_location_id
        description: FK linking to the locations dimension, representing the location the order was placed at.
        entity:
          type: foreign
          name: order_location_id
          label: Location

      - name: order_total
        description: The total amount of the order in USD including tax.
        dimension:
          type: categorical
          name: order_total
          label: order total

      - name: ordered_at
        description: The timestamp the order was placed at.

      - name: ordered_at_date
        description: The day the order was placed at.
        dimension:
          type: time
          name: ordered_at_date
          label: ordered at date
        granularity: day

      - name: count_food_items
        description: The number of individual food items ordered.
      - name: count_drink_items
        description: The number of individual drink items ordered.
      - name: count_items
        description: The total number of both food and drink items ordered.
      - name: subtotal_food_items
        description: The sum of all the food item prices without tax.
      - name: subtotal_drink_items
        description: The sum of all the drink item prices without tax.
      - name: subtotal
        description: The sum total of both food and drink item prices without tax.
      - name: order_cost
        description: The sum of supply expenses to fulfill the order.
      - name: location_name
        description: The full location name of where this order was placed. Denormalized from `stg_locations`.
      - name: is_first_order
        description: A boolean indicating if this order is from a new customer placing their first order.

      - name: is_food_order
        description: A boolean indicating if this order include any food items.
        dimension:
          type: categorical
          name: is_food_order
          label: food order boolean

      - name: is_drink_order
        description: A boolean indicating if this order include any drink items.
        dimension:
          type: categorical
          name: is_drink_order
          label: drink order boolean

    semantic_model:
      enabled: true
      name: fct_autre_orders

    agg_time_dimension: ordered_at_date

    metrics:
      - name: m_order_total
        label: order_total
        description: Sum of orders value
        type: simple
        agg: sum
        expr: order_total

      - name: m_order_count
        label: order_count
        description: Count of orders
        type: simple
        agg: count
        expr: order_id

      # cf dim_autre_customers
      # - name: m_customers_with_orders
      #   label: customers_with_orders
      #   description: Distinct count of customers placing orders
      #   type: simple
      #   agg: count_distinct
      #   expr: order_customer_id

      - name: m_order_total_food
        label: order_total_food
        description: Sum of orders value
        type: simple
        agg: sum
        expr: order_total
        filter: |
          {{ Dimension('order_id__is_food_order') }} = True

      - name: m_order_amount_food
        label: order_amount_food
        description: The cost of fulfilling each order
        type: simple
        agg: sum
        expr: order_cost
        filter: |
          {{ Dimension('order_id__is_food_order') }} = True

      - name: m_locations_with_orders
        label: locations_with_orders
        description: The number of locations that have orders.
        type: simple
        agg: count_distinct
        expr: order_location_id

      - name: m_order_value_p99
        label: order value p99
        description: The 99th percentile of each order
        type: simple
        agg: percentile
        expr: order_total
        percentile: 0.99
        percentile_type: continuous

      ### Only approximate continous percentile aggregations are supported for BigQuery. 
      ### Set use_approximate_percentile and disable use_discrete_percentile in all percentile simple-metrics
      # - name: m_discrete_order_value_p99
      #   label: discrete order value p99
      #   description: The 99th percentile of each order using a discrete distribution
      #   type: simple
      #   agg: percentile
      #   expr: order_total
      #   percentile: 0.99
      #   percentile_type: discrete

      - name: m_large_order
        label: Large Orders
        description: Count of orders with order total over 20.
        type: simple
        agg: sum
        expr: 1
        filter: |
          {{ Dimension('order_id__order_total') }} >= 20

      - name: m_food_order_amount
        label: food_order_amount
        description: Sum order amount for food orders.
        type: simple
        agg: sum
        expr: case when is_food_order then order_total else 0 end

      - name: m_max_order_amount
        label: max_order_amount
        description: The highest order value for a given period
        type: simple
        agg: max
        expr: order_total

      - name: m_min_order_amount
        label: min_order_amount
        description: The lowest order value for a given period
        type: simple
        agg: min
        expr: order_total

      - name: m_order_amount
        label: order_amount
        description: The cost of fulfilling each order
        type: simple
        agg: sum
        expr: order_cost

      - name: m_tax_paid
        description: The total tax paid on each order.
        type: simple
        agg: sum
        expr: tax_paid
        #hidden: true

# Cross-model metrics (not simple ones)
# cf https://docs.getdbt.com/docs/build/latest-metrics-spec
metrics:
# RATIO METRICS
  - name: m_food_order_pct
    label: food_order_pct
    description: The food cost as the % of the total order
    type: ratio
    numerator: m_food_order_amount
    denominator: m_order_total

# DERIVED METRICS
  - name: m_food_order_pct_cumulative
    label: food_order_as_percent_of_total_order_amount
    description: Food order total as a % of total order amount
    type: derived
    expr: m_food_order_pct * 100
    input_metrics: 
      - name: m_food_order_pct

  - name: m_food_order_gross_profit
    label: food_order_gross_profit
    description: The gross profit for each food order
    type: derived
    expr: revenue - cost
    input_metrics:
      - name: m_order_total_food
        alias: revenue
      - name: m_order_amount_food
        alias: cost

# CUMULATIVE METRICS
  - name: m_cumulative_order_amount
    label: cumulative_order_amount
    description: The cumulative value of all orders
    type: cumulative
    input_metric: m_order_total

  - name: m_cumulative_order_amount_l1m
    label: cumulative_order_amount_l1m
    description: Trailing 1 month cumulative order amount
    type: cumulative
    input_metric: m_order_total
    window: 1 month

  - name: m_cumulative_order_amount_mtd
    label: cumulative_order_amount_mtd
    description: The month to date value of all orders
    type: cumulative
    input_metric: m_order_total
    grain_to_date: month

################################################################################
saved_queries:
  - name: order_metrics
    description: testing out order metrics in one table
    query_params:
      metrics:
        - m_min_order_amount
        - m_max_order_amount
        - m_cumulative_order_amount
      group_by:
        - TimeDimension('metric_time', 'day')
    exports:
      - name: order_metrics
        config:
          export_as: table
