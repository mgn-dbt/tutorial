semantic_models:
  - name: customers
    defaults:
      agg_time_dimension: first_ordered_at
    description: |
      Customer grain mart.
    model: ref('dim_autre_customers')
    entities:
      - name: e_customer
        expr: customer_id
        type: primary
    dimensions:
      - name: customer_name
        type: categorical
      - name: customer_type
        type: categorical
      - name: first_ordered_at
        type: time
        type_params:
          time_granularity: day
      - name: last_ordered_at
        type: time
        type_params:
          time_granularity: day
    measures:
      - name: count_lifetime_orders
        description: Total count of orders per customer.
        agg: sum
      - name: lifetime_spend_pretax
        description: Customer lifetime spend before taxes.
        agg: sum
      - name: lifetime_spend
        description: Gross customer lifetime spend inclusive of taxes.
        agg: sum
      - name: customers
        description: Count of customers
        agg: count_distinct
        expr: customer_id

metrics:
  # Simple metrics
  - name: customers
    description: Count of customers
    type: simple
    label: customers
    type_params:
      measure: customers

  # https://docs.getdbt.com/docs/build/join-logic
  # entities must have the same name between models to be automatically joined. 
  # In this case, the e_customer entity is defined in both the dim_autre_customers and fct_autre_orders models, 
  # so they will be automatically joined on customer_id.
  - name: new_customers
    description: Unique count of new customers.
    label: New Customers
    type: simple
    type_params:
      measure: customers_with_orders
    filter: |
      {{ Dimension('e_customer__customer_type') }}  = 'new'
