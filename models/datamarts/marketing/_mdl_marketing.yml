models:
  - name: dim_customers
    description: This table has basic information about a customer, as well as some derived facts based on a customer's orders
    ### Contract enforced involve adding data_type to columns. 
    ### This will cause dbt to fail if the data type of a column changes in the future.
    # config:
    #   contract:
    #     enforced: true
    columns:
      - name: customer_id
        description: This is a unique identifier for a customer
        data_tests:
          - unique
          - not_null
          - dbt_utils.cardinality_equality:
              arguments:
                field: customer_id
                to: ref('stg_jaffle_shop__customers')

      - name: first_name
        description: Customer's first name. PII.

      - name: last_name
        description: Customer's last name. PII.

      - name: first_order_date
        description: Date (UTC) of a customer's first order

      - name: most_recent_order_date
        description: Date (UTC) of a customer's most recent order

      - name: lifetime_value
        description: Total value of all customer's orders
        data_tests: 
          - avg_greater_than:
              arguments:
                group_by_column: customer_id

      - name: number_of_orders
        description: Count of the number of orders a customer has placed

      - name: employee_id
        description: |
          Identifier of the employee associated with the customer
          seed

    versions:
      - v: 1
        description: |
          Initial version of the model.
      - v: 2
        description: |
          Added a new column to the model.
        columns:
          - name: employee_email
            description: |
              email address of the employee associated with the customer
              seed

    latest_version: 2

# dbt run --select dim_customers.v1
# dbt run --select dim_customers.v2
# dbt run --select dim_customers,version:latest