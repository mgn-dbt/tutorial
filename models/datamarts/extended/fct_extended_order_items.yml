semantic_models:
  - name: order_item
    defaults:
      agg_time_dimension: ordered_at_date
    description: |
      Items contained in each order. The grain of the table is one row per order item.
    model: ref('fct_autre_order_items')
    entities:
      - name: p_order_item
        type: primary
        expr: order_item_id
      - name: f_order
        type: foreign
        expr: order_id
      - name: f_product
        type: foreign
        expr: product_id
    dimensions:
      - name: ordered_at
        type: time
        type_params:
          time_granularity: day
      - name: ordered_at_date
        type: time
        type_params:
          time_granularity: day
      - name: is_food_item
        type: categorical
      - name: is_drink_item
        type: categorical

    measures:
      - name: revenue
        description: The revenue generated for each order item. Revenue is calculated as a sum of revenue associated with each product in an order.
        agg: sum
        expr: product_price

      - name: food_revenue
        description: The revenue generated for each order item. Revenue is calculated as a sum of revenue associated with each product in an order.
        agg: sum
        expr: case when is_food_item = 1 then product_price else 0 end

      - name: drink_revenue
        description: The revenue generated for each order item. Revenue is calculated as a sum of revenue associated with each product in an order.
        agg: sum
        expr: case when is_drink_item = 1 then product_price else 0 end

metrics:
  # Simple metrics
  - name: revenue
    description: Sum of the product revenue for each order item. Excludes tax.
    type: simple
    label: Revenue
    type_params:
      measure: 
        name: revenue
        fill_nulls_with: 0
  
  - name: order_cost
    description: Sum of cost for each order item.
    label: Order Cost
    type: simple
    type_params:
      measure: order_cost

  - name: food_revenue
    description: The revenue from food in each order
    label: Food Revenue
    type: simple
    type_params:
      measure: food_revenue

  #Ratio Metrics
  - name: food_revenue_pct
    description: The % of order revenue from food.
    label: Food Revenue %
    type: ratio
    type_params:
      numerator: food_revenue
      denominator: revenue
