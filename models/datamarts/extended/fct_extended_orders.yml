semantic_models:
  - name: orders
    defaults:
      agg_time_dimension: ordered_at_date
    description: |
      Order fact table. This table is at the order grain with one row per order.
    model: ref('fct_autre_orders')
    entities:
      - name: e_order
        type: primary
        expr: order_id
      - name: e_location
        type: foreign
        expr: location_id
      - name: e_customer
        type: foreign
        expr: customer_id
    dimensions:
      - name: ordered_at
        type: time
        type_params:
          time_granularity: day
      - name: ordered_at_date
        type: time
        type_params:
          time_granularity: day
      - name: order_total_dim
        type: categorical
        expr: order_total
      - name: is_food_order
        type: categorical
      - name: is_drink_order
        type: categorical
    measures:
      - name: order_total
        description: The total amount for each order including taxes.
        agg: sum
      - name: order_count
        agg: count_distinct
        expr: order_id
      - name: tax_paid
        description: The total tax paid on each order.
        agg: sum
      - name: customers_with_orders
        description: Distinct count of customers placing orders
        agg: count_distinct
        expr: customer_id
      - name: locations_with_orders
        description: Distinct count of locations with order
        agg: count_distinct
        expr: location_id
      - name: order_cost
        description: The cost for each order item. Cost is calculated as a sum of the supply cost for each order item.
        agg: sum

metrics:
  - name: order_total
    description: Sum of total order amonunt. Includes tax + revenue.
    type: simple
    label: Order Total
    type_params:
      measure: order_total
  
  - name: large_order
    description: "Count of orders with order total over 20."
    type: simple
    label: "Large Orders"
    type_params:
      measure: order_count
    filter: |
      {{ Dimension('e_order__order_total_dim') }} >= 20

  - name: customers_with_orders
    description: "Distinct count of customers placing orders"
    type: simple
    label: Customers w/ Orders
    type_params:
      measure: customers_with_orders
  
  - name: orders_fill_nulls_with_zero
    description: Example metric colaescing null to zero. 
    label: Orders (Fill nulls with 0)
    type: simple
    type_params:
      measure: 
        name: order_count
        fill_nulls_with: 0
        join_to_timespine: true
  
  - name: twice_orders_fill_nulls_with_0
    description: Example derived metric.
    label: Twice Orders
    type: derived
    type_params:
      expr: 2 * orders_fill_nulls_with_zero
      metrics:
        - orders_fill_nulls_with_zero
  
  - name: food_orders
    description: Count of orders that contain food order items
    label: Food Orders
    type: simple
    type_params:
      measure: order_count
    filter: |
      {{ Dimension('e_order__is_food_order') }} = true

  - name: orders
    description: Count of orders.
    label: Orders
    type: simple
    type_params:
      measure: order_count

  - name: orders_last_7_days
    description: Count of orders.
    label: orders last 7 days
    type: cumulative
    type_params:
      measure: order_count
      cumulative_type_params:
        window: 7 days

