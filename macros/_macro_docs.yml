macros:
  - name: audit_helper_compare_column_values
    description: >
      This macro compares fct_orders and fct_orders__deprecated
      and returns a count of mismatches.
    arguments: []

  - name: cents_to_dollars
    description: >
      This macro converts cents to dollars.
    arguments: 
      - name: column_name
        type: string
        description: The amount in cents to be converted to dollars.
      - name: scale
        type: integer
        description: The number of decimal places to round the result to.



  - name: from_info_schema
    description: >
      This macro generates a from clause forthe information schema.
    arguments:
      - name: info_schema_type
        type: string
        description: The name of the table for which to retrieve metadata.
      - name: dataset
        type: optional[string]
        description: The name of the dataset to which the information schema table belongs. 

  - name: generate_schema_name
    description: >
      This macro generates a schema name based on the provided custom schema name and node name.
    arguments:
      - name: custom_schema_name
        type: string
        description: The custom schema name to be used.
      - name: node
        type: string
        description: The name of the node for which to generate the schema name.

  - name: grant_select
    description: >
      This macro generates a SQL statement to grant SELECT privileges on a specified schema to a specified role.
    arguments:
      - name: schema
        type: optional[string]
        description: The name of the schema on which to grant SELECT privileges.
      - name: role
        type: optional[string]
        description: The name of the role to whom the SELECT privileges will be granted.

  - name: incremental_filter
    description: >
      This macro generates a SQL WHERE clause to filter records based on an incremental loading strategy.
    arguments:
      - name: timestamp_column
        type: string
        description: The name of the column to be used for filtering.
      - name: interval_days
        type: optional[integer]
        description: The number of days to consider for incremental loading.



  - name: my_current_timestamp
    description: >
      This macro returns the current timestamp in the format 'YYYY-MM-DD HH:MI:SS'.
    arguments: []

  - name: my_initcap
    description: >
      This macro capitalizes the first letter of each word in a string 
      and converts the rest to lowercase.
    arguments:
      - name: chaine
        type: string
        description: The string to be transformed.

  - name: my_make_date
    description: >
      This macro creates a date from year, month, and day components.
    arguments:
      - name: year
        type: integer
        description: The year component of the date.
      - name: month
        type: integer
        description: The month component of the date.
      - name: day
        type: integer
        description: The day component of the date.

  - name: safe_ratio
    description: >
      This macro calculates the ratio of two numbers while safely handling division by zero.
    arguments:
      - name: numerator
        type: numeric
        description: The numerator of the ratio.
      - name: denominator
        type: numeric
        description: >
          The denominator of the ratio. 
          If this is zero, the macro will return NULL to avoid division by zero errors.
      - name: default_value
        type: optional[numeric]
        description: >
          The value to return if the denominator is zero. 
          If not provided, the macro will return NULL by default.
