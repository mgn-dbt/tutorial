name: 'jaffle_shop'
version: '1.0.0'
config-version: 2

# This setting configures which "profile" dbt uses for this project.
profile: 'default'

# These configurations specify where dbt should look for different types of files.
# The `model-paths` config, for example, states that models in this project can be
# found in the "models/" directory. You probably won't need to change these!
model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

clean-targets:         # directories to be removed by `dbt clean`
  - "target"
  - "dbt_packages"

# Configuring models
# Full documentation: https://docs.getdbt.com/docs/configuring-models

# In dbt, the default materialization for a model is a view. This means, when you run 
# dbt run or dbt build, all of your models will be built as a view in your data platform. 
# The configuration below will override this setting for models in the example folder to 
# instead be materialized as tables. Any models you add to the root of the models folder will 
# continue to be built as views. These settings can be overridden in the individual model files
# using the `{{ config(...) }}` macro.

models:
  jaffle_shop:
    +meta:
      required_docs: true
    staging:
      +materialized: view
      +meta:
        required_tests: {"unique.*|not_null": 2}
    marts:
      +materialized: table

### warning sur les seeds desactivés s'ils contiennent des tests
### dbt veut True/False ou null mais pas de jinja 
### +enabled: "{#{ var('load_source_data', 'False') | as_bool }#}"
# dbt seed --full-refresh -s "tag:raw"
seeds:
  jaffle_shop:
    +persist_docs:
      relation: true
      columns: true
    autre:
      +schema: seeds_autre
      +tags: 'autre'
      +enabled: true
    marts:
      +tags: 'marts'
      +enabled: true
    raw:
      +schema: seeds_raw
      +tags: 'raw'
      +enabled: true

# Configuration for dbt Cloud
dbt-cloud:
  project-id: 70471823535774

# pour dbt_date et dbt_expectations
vars:
  'dbt_date:time_zone': 'Europe/Paris'
  truncate_timespan_to: "{{ current_timestamp() }}"

# BigQuery specific flags
# https://docs.getdbt.com/reference/global-configs/behavior-changes
flags:
  bigquery_use_batch_source_freshness: true
  require_generic_test_arguments_property: true