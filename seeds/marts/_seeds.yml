seeds:
  - name: employees
    description: employees
    config:
      column_types:
        employee_id: integer
        email: string
        customer_id: integer
    columns:
      - name: employee_id
        description: employee id
        data_tests:
          - unique
          - not_null
      - name: email
        description: employee email
      - name: customer_id
        description: customer id