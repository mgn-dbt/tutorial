seeds:
  - name: raw_customers
    description: raw customers
    config:
      column_types:
        id: string
        first_name: string
        last_name: string
      post_hook:
        - "CREATE SCHEMA IF NOT EXISTS `{{ target.database }}.dbt_raw_jaffle_shop`"
        - "DROP TABLE IF EXISTS `{{ target.database }}.dbt_raw_jaffle_shop.customers`"
        - "CREATE  TABLE `{{ target.database }}.dbt_raw_jaffle_shop.customers` AS 
          select cast(id as integer) as id, first_name, last_name
          from {{ this}}"
    columns:
      - name: id
        description: customer id
      - name: first_name
        description: first name
      - name: last_name
        description: last name

  - name: raw_orders
    description: raw orders
    config:
      column_types:
        id: string
        user_id: string
        order_date: string
        status: string
      post_hook:
        - "CREATE SCHEMA IF NOT EXISTS `{{ target.database }}.dbt_raw_jaffle_shop`"
        - "DROP TABLE IF EXISTS `{{ target.database }}.dbt_raw_jaffle_shop.orders`"
        - "CREATE  TABLE `{{ target.database }}.dbt_raw_jaffle_shop.orders` AS 
          select 
            cast(id as integer) as id,
            cast(user_id as integer) as user_id,
            cast(order_date as date) as order_date,
            status,
            datetime_add(current_datetime, interval -16 hour) as _etl_loaded_at
          from {{ this}}"
    columns:
      - name: id
        description: order id
      - name: user_id
        description: customer id
      - name: order_date
        description: date of the order
      - name: status
        description: status of the order

  - name: raw_payments
    description: raw payments
    config:
      column_types:
        id: string
        orderid: string
        paymentmethod: string
        status: string
        amount: string
        created: string
      post_hook:
        - "CREATE SCHEMA IF NOT EXISTS `{{ target.database }}.dbt_raw_stripe`"
        - "DROP TABLE IF EXISTS `{{ target.database }}.dbt_raw_stripe.payment`"
        - "CREATE  TABLE `{{ target.database }}.dbt_raw_stripe.payment` AS 
          select 
            cast(id as integer) as id,
            cast(orderid as integer) as orderid,
            paymentmethod,
            status,
            cast(amount as integer) as amount,
            cast(created as date) as created,
            datetime_add(current_datetime, interval -4 hour) as _batched_at
          from {{ this}}"
    columns:
      - name: id
        description: payment id
      - name: orderid
        description: order id
      - name: paymentmethod
        description: payment method
      - name: status
        description: payment status
      - name: amount
        description: payment amount
      - name: created
        description: payment created date
