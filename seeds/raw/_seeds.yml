# attention les types dans les seeds sont volatiles alors on les passe tous en string
seeds:
  - name: raw_customers
    description: raw customers
    config:
      # column_types:
      #   id: string
      #   first_name: string
      #   last_name: string
      post_hook:
        # - "CREATE SCHEMA IF NOT EXISTS {{ target.database }}.dbt_raw_jaffle_shop"  adapter.get_relation(database='jaffle_shop', schema='dbt_raw_jaffle_shop', identifier='customers')  
        - "{%- set rel = adapter.get_relation(
            database=target.database, 
            schema='dbt_raw_jaffle_shop', 
            identifier='customers') -%}
          {% do drop_relation_if_exists(relation=rel) %}"
        - "CREATE  TABLE {{ target.database }}.dbt_raw_jaffle_shop.customers AS 
          select 
            {{ dbt.cast('id', dbt.type_int()) }} as id, 
            first_name, 
            last_name
          from {{ this }}"
    columns:
      - name: id
        description: customer id
      - name: first_name
        description: first name
      - name: last_name
        description: last name

  - name: raw_orders
    description: raw orders
    config:
      # column_types:
      #   id: string
      #   user_id: string
      #   order_date: string
      #   status: string
      post_hook:
        # - "CREATE SCHEMA IF NOT EXISTS {{ target.database }}.dbt_raw_jaffle_shop"
        - "{%- set rel = adapter.get_relation(
            database=target.database, 
            schema='dbt_raw_jaffle_shop', 
            identifier='orders') -%}
          {% do drop_relation_if_exists(relation=rel) %}"
        - "CREATE  TABLE {{ target.database }}.dbt_raw_jaffle_shop.orders AS 
          select 
            {{ dbt.cast('id', dbt.type_int()) }} as id,
            {{ dbt.cast('user_id', dbt.type_int()) }} as user_id,
            {{ dbt.cast('order_date', 'date') }} as order_date,
            status,
            {{ dbt.dateadd(
              datepart='hour', 
              interval=-16, 
              from_date_or_timestamp=dbt.current_timestamp())
            }} as _etl_loaded_at
          from {{ this }}"
    columns:
      - name: id
        description: order id
      - name: user_id
        description: customer id
      - name: order_date
        description: date of the order
      - name: status
        description: status of the order

  - name: raw_payments
    description: raw payments
    config:
      # column_types:
      #   id: string
      #   orderid: string
      #   paymentmethod: string
      #   status: string
      #   amount: string
      #   created: string
      post_hook:
        # - "CREATE SCHEMA IF NOT EXISTS {{ target.database }}.dbt_raw_stripe"
        - "{%- set rel = adapter.get_relation(
            database=target.database, 
            schema='dbt_raw_stripe', 
            identifier='payment') -%}
          {% do drop_relation_if_exists(relation=rel) %}"
        - "CREATE  TABLE {{ target.database }}.dbt_raw_stripe.payment AS 
          select 
            {{ dbt.cast('id', dbt.type_int()) }} as id,
            {{ dbt.cast('orderid', dbt.type_int()) }} as orderid,
            paymentmethod,
            status,
            {{ dbt.cast('amount', dbt.type_int()) }} as amount,
            {{ dbt.cast('created', 'date') }} as created,
            {{ dbt.dateadd(
              datepart='hour', 
              interval=-4, 
              from_date_or_timestamp=dbt.current_timestamp())
            }} as _batched_at
          from {{ this }}"
    columns:
      - name: id
        description: payment id
      - name: orderid
        description: order id
      - name: paymentmethod
        description: payment method
      - name: status
        description: payment status
      - name: amount
        description: payment amount
      - name: created
        description: payment created date
