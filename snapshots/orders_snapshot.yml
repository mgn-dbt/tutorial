snapshots:
  - name: orders_snapshot
    relation: source('jaffle_shop', 'orders')
    config:
      # schema: snapshots
      database: dbt-jaffle-shop-481313
      unique_key: id
      strategy: check
      # respecter la casse de BigQuery (attention a l'en-tete des seeds)
      check_cols: 
        - user_id
        - order_date
        - status
      hard_deletes: ignore
      dbt_valid_to_current: "TIMESTAMP(DATE(9999, 12, 31))"
      # updated_at: "TIMESTAMP(_etl_loaded_at)"