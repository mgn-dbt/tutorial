snapshots:
  - name: orders_snapshot
    relation: source('jaffle_shop', 'orders')
    config:
      # schema: snapshots
      unique_key: id
      strategy: check
      ### respecter la casse de BigQuery (attention a l'en-tete des seeds)
      check_cols: 
        - user_id
        - order_date
        - status
      hard_deletes: ignore
      dbt_valid_to_current: "
        {% if target.type == 'postgres' %}timestamp '9999-12-31'
        {% elif target.type == 'bigquery' %}timestamp('9999-12-31')
        {% elif target.type == 'duckdb' %}'9999-12-31'
        {% endif %}"
      # updated_at: "TIMESTAMP(_etl_loaded_at)"